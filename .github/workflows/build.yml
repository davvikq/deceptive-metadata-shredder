name: Build Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    env:
      EXIFTOOL_VERSION: "13.56"
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 pyinstaller
          pip install -r requirements.txt
          pip install -e .
      - name: Install exiftool (macOS)
        if: runner.os == 'macOS'
        run: brew install exiftool
      - name: Install exiftool (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libimage-exiftool-perl
      - name: Download exiftool (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $zipName = "exiftool-$env:EXIFTOOL_VERSION`_64.zip"
          $downloadUrl = "https://exiftool.org/$zipName"
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          if (Test-Path "bin/exiftool.exe") { Remove-Item "bin/exiftool.exe" -Force }
          if (Test-Path "bin/exiftool_files") { Remove-Item "bin/exiftool_files" -Recurse -Force }
          curl -L $downloadUrl -o exiftool.zip
          $checksums = Invoke-WebRequest -Uri "https://exiftool.org/checksums.txt" -UseBasicParsing
          $pattern = "SHA2-256\(" + [regex]::Escape($zipName) + "\)=\s*([0-9a-fA-F]{64})"
          $match = [regex]::Match($checksums.Content, $pattern)
          if (-not $match.Success) {
            throw "Could not find SHA256 for $zipName in checksums.txt"
          }
          $expectedSha256 = $match.Groups[1].Value.ToLowerInvariant()
          $actualSha256 = (Get-FileHash exiftool.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualSha256 -ne $expectedSha256) {
            throw "Checksum mismatch for $zipName. expected=$expectedSha256 actual=$actualSha256"
          }
          Expand-Archive exiftool.zip -DestinationPath bin/exiftool_download -Force
          $packageRoot = Get-ChildItem bin/exiftool_download | Where-Object { $_.PSIsContainer } | Select-Object -First 1
          Move-Item (Join-Path $packageRoot.FullName "exiftool(-k).exe") "bin/exiftool.exe"
          New-Item -ItemType Directory -Force -Path "bin/exiftool_files" | Out-Null
          Get-ChildItem $packageRoot.FullName | Where-Object { $_.Name -ne "exiftool(-k).exe" } | Move-Item -Destination "bin/exiftool_files"
          Remove-Item exiftool.zip -Force
          Remove-Item "bin/exiftool_download" -Recurse -Force
      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: >
          pyinstaller --onefile --windowed
          --additional-hooks-dir hooks/
          --add-binary "bin/exiftool.exe;bin"
          --add-data "src/dms/data;dms/data"
          --add-data "bin/exiftool_files;bin/exiftool_files"
          --icon=src/dms/data/icon.ico
          --name "DMS_Portable"
          --exclude-module matplotlib
          --exclude-module pandas
          --exclude-module PyQt5
          --exclude-module wx
          --exclude-module gi
          --exclude-module IPython
          --exclude-module jupyter
          --exclude-module notebook
          src/dms/interfaces/gui/app.py
      - name: Install Inno Setup
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install innosetup --no-progress -y
      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $appVersion = "${{ github.ref_name }}".TrimStart('v')
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "scripts\installer.iss" "/DMyAppVersion=$appVersion"
      - name: Build executable (macOS)
        if: runner.os == 'macOS'
        run: >
          pyinstaller --onefile --windowed
          --additional-hooks-dir hooks/
          --add-data "src/dms/data:dms/data"
          --icon=src/dms/data/icon.ico
          --name "DMS"
          --exclude-module matplotlib
          --exclude-module pandas
          --exclude-module PyQt5
          --exclude-module wx
          --exclude-module gi
          --exclude-module IPython
          --exclude-module jupyter
          --exclude-module notebook
          src/dms/interfaces/gui/app.py
      - name: Build executable (Linux)
        if: runner.os == 'Linux'
        run: >
          pyinstaller --onefile
          --additional-hooks-dir hooks/
          --add-data "src/dms/data:dms/data"
          --icon=src/dms/data/icon.ico
          --name "DMS"
          --exclude-module matplotlib
          --exclude-module pandas
          --exclude-module PyQt5
          --exclude-module wx
          --exclude-module gi
          --exclude-module IPython
          --exclude-module jupyter
          --exclude-module notebook
          src/dms/interfaces/gui/app.py
      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: deceptive-metadata-shredder-${{ matrix.os }}
          path: |
            dist/DMS_Portable.exe
            dist/DMS_Setup.exe
      - name: Upload artifacts (macOS/Linux)
        if: matrix.os != 'windows-latest'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: deceptive-metadata-shredder-${{ matrix.os }}
          path: dist/*
      - name: Create release assets (Windows)
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@7b4da11513bf3f43f9999e90eabced41ab8bb048
        with:
          files: |
            dist/DMS_Portable.exe
            dist/DMS_Setup.exe
      - name: Create release assets (macOS/Linux)
        if: matrix.os != 'windows-latest'
        uses: softprops/action-gh-release@7b4da11513bf3f43f9999e90eabced41ab8bb048
        with:
          files: dist/*
